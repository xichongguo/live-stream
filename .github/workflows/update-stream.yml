name: Update Live Streams

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # ✅ 已修正：GitHub Actions 默认使用 UTC 时间
    # 北京时间 07:00, 12:00, 18:00 对应 UTC 时间 23:00, 04:00, 10:00
    - cron: '0 23,4,10 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-stream.yml'
      - 'get_live_stream.py'
      - 'whitelist.txt'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🔻 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 🐍 Run Generator Script
        run: |
          python get_live_stream.py
          
          # 🔍 简单检查文件是否生成（保留了核心检查）
          if [ -f "live/current.m3u8" ]; then
            echo "✅ live/current.m3u8 文件生成成功"
          else
            echo "❌ live/current.m3u8 文件未找到！"
            exit 1
          fi

      - name: 📂 Ensure .nojekyll
        run: touch .nojekyll

      - name: 📤 Commit & Push Changes
        run: |
          # 配置 Git 用户信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加更改的文件
          git add live/current.m3u8 .nojekyll
          
          # 检查是否有更改需要提交
          if git diff --staged --quiet; then
            echo "ℹ️ 无更改需要提交"
            exit 0
          else
            # 提交并推送
            git commit -m "🔄 自动更新直播源 [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push
          fi
