name: Update Live Streams

# 👇 解决 Node.js 20 警告：强制使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 每天 10:00 和 23:00 UTC（即北京时间 18:00 和 07:00）
    - cron: '0 23,10 * * *' 
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-stream.yml'
      - 'get_live_stream.py'
      - 'whitelist.txt'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🔻 Checkout Code
        uses: actions/checkout@v4
        with:
          # v4 默认行为已优化，无需特殊配置即可支持 push
          fetch-depth: 0

      - name: ⚙️ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 🐍 Run Generator Script
        run: |
          # 运行脚本（默认模式：生成文件）
          python get_live_stream.py
          
          # 输出日志，方便调试
          echo "📄 M3U8 内容预览:"
          head -n 10 live/current.m3u8 || echo "文件生成失败或为空"

      - name: 📂 Ensure .nojekyll
        run: touch .nojekyll

      - name: 📤 Commit & Push Changes
        # 使用专用 Action 简化 Git 推送流程
        uses: ad-m/github-push-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 只有当 live/ 目录或 .nojekyll 发生变化时才会触发 push
          push_options: '--follow-tags --set-upstream'
          commit_message: "🔄 自动更新直播源 [$(date +'%Y-%m-%d %H:%M:%S')]"
