name: Update Live Streams

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # ⚠️ 修正：GitHub Actions 的 cron 只有 5 个字段 (分 时 日 月 周)
    # 🌟 推荐：直接指定时区为亚洲/上海，无需手动换算 UTC
    # 北京时间 07:00, 12:00, 18:00 执行
    - cron: '0 7,12,18 * * *'
      timezone: 'Asia/Shanghai'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/update-stream.yml'
      - 'get_live_stream.py'
      - 'whitelist.txt'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🔻 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: pip install requests

      - name: 🐍 Run Generator Script
        run: |
          python get_live_stream.py
          
          # 🔍 调试：检查文件是否真的生成了
          echo "🔍 检查文件系统:"
          find . -type f 
          echo "📄 文件内容预览:"
          cat live/current.m3u8 || echo "文件不存在或为空"

      - name: 📂 Ensure .nojekyll
        run: touch .nojekyll

      - name: 📤 Commit & Push Changes
        run: |
          # 配置 Git 用户信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加更改的文件
          git add live/current.m3u8 .nojekyll
          
          # 检查是否有更改需要提交
          if git diff --staged --quiet; then
            echo "ℹ️ 无更改需要提交"
            exit 0
          else
            # 提交并推送
            git commit -m "🔄 自动更新直播源 [$(date +'%Y-%m-%d %H:%M:%S')]"
            git push
          fi
